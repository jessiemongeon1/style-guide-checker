name: Monitor PRs for Style Guide

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  find-and-audit:
    name: Find PRs with doc changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find and audit PRs
        env:
          GH_TOKEN: ${{ secrets.DOCS_MONITOR_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/find-and-audit-prs.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git pull --rebase origin main || true
            git commit -m "chore: update audited PRs state"
            git push || echo "Push failed — state will be retried next run"
          fi
