name: Docs Style Guide Audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**.mdx'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      repo:
        description: 'Repo to audit (owner/name)'
        required: true
      pr_number:
        description: 'PR number to audit'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  style-guide-audit:
    name: Style guide audit
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get changed mdx files
        id: changed-files
        env:
          GH_TOKEN: ${{ secrets.DOCS_MONITOR_PAT || secrets.GITHUB_TOKEN }}
          # Support both local PRs and external repo PRs via workflow_dispatch
          TARGET_REPO: ${{ inputs.repo || github.repository }}
          TARGET_PR: ${{ inputs.pr_number || github.event.pull_request.number }}
        run: |
          changed=$(gh pr diff "$TARGET_PR" --repo "$TARGET_REPO" --name-only | grep '\.mdx$' || true)
          if [ -z "$changed" ]; then
            echo "files=" >> $GITHUB_OUTPUT
            echo "No .mdx files changed"
          else
            echo "$changed" > /tmp/changed_mdx_files.txt
            echo "files=/tmp/changed_mdx_files.txt" >> $GITHUB_OUTPUT
            echo "Changed .mdx files:"
            echo "$changed"
          fi

          # Checkout the PR's actual branch so the audit reads the changed files
          if [ "$TARGET_REPO" != "${{ github.repository }}" ]; then
            echo "Cloning $TARGET_REPO..."
            git clone --depth=1 "https://github.com/$TARGET_REPO.git" /tmp/target-repo
            cd /tmp/target-repo
            echo "Fetching PR $TARGET_PR head..."
            git fetch origin "pull/$TARGET_PR/head:pr-branch" --depth=1
            echo "Checking out pr-branch..."
            git checkout pr-branch
            echo "Current HEAD: $(git rev-parse HEAD)"
            echo "Verifying file content..."
            head -30 docs/content/sui-stack.mdx 2>/dev/null || echo "File not found at expected path"
            cd -
            echo "repo_root=/tmp/target-repo" >> $GITHUB_OUTPUT
          else
            echo "repo_root=${{ github.workspace }}" >> $GITHUB_OUTPUT
          fi

      - name: Run style guide audit
        if: steps.changed-files.outputs.files != ''
        env:
          CHANGED_FILES: /tmp/changed_mdx_files.txt
          AUDIT_REPO_ROOT: ${{ steps.changed-files.outputs.repo_root }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/style_guide_audit.py

      - name: Post review comment
        if: steps.changed-files.outputs.files != '' && always()
        env:
          GH_TOKEN: ${{ secrets.DOCS_MONITOR_PAT || secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ inputs.repo || github.repository }}
          TARGET_PR: ${{ inputs.pr_number || github.event.pull_request.number }}
        run: |
          if [ ! -f /tmp/audit_review.md ]; then
            echo "No audit results to post"
            exit 0
          fi

          if [ -z "$TARGET_PR" ] || [ "$TARGET_PR" = "" ]; then
            echo "No PR number available — printing results to stdout instead"
            cat /tmp/audit_review.md
            exit 0
          fi

          marker="<!-- style-guide-audit -->"
          existing=$(gh api "repos/$TARGET_REPO/issues/$TARGET_PR/comments" \
            --paginate --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -1 || true)

          body=$(cat /tmp/audit_review.md)

          if [ -n "$existing" ]; then
            gh api "repos/$TARGET_REPO/issues/comments/$existing" \
              -X PATCH -f body="$body"
            echo "Updated existing review comment"
          else
            gh api "repos/$TARGET_REPO/issues/$TARGET_PR/comments" \
              -X POST -f body="$body"
            echo "Posted new review comment"
          fi

      - name: Notify Slack
        if: steps.changed-files.outputs.files != '' && always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_REPO: ${{ inputs.repo || github.repository }}
          TARGET_PR: ${{ inputs.pr_number || github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title || 'External PR' }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ] || [ ! -f /tmp/audit_review.md ]; then
            echo "Skipping Slack notification"
            exit 0
          fi

          total=$(grep -oP '^\*\*\K[0-9]+' /tmp/audit_review.md | head -1)
          total=${total:-0}
          pr_url="https://github.com/$TARGET_REPO/pull/$TARGET_PR"

          payload=$(jq -n \
            --arg text "*Style Guide Audit:* <$pr_url|$TARGET_REPO#$TARGET_PR> — $PR_TITLE
          Total edits needed: *$total*" \
            '{text: $text}')

          curl -s -X POST -H 'Content-Type: application/json' \
            -d "$payload" "$SLACK_WEBHOOK_URL"
          echo "Slack notification sent"
